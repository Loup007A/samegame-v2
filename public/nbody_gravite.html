<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulation N-Corps Gravitationnelle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #02030a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; font-family: system-ui, sans-serif;
      padding: 20px;
    }
    h1 { color: #6688aa; font-size: 17px; font-weight: 500; margin-bottom: 12px; letter-spacing: 0.06em; }

    #wrap { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid #0d1520; }
    canvas { display: block; width: 100%; cursor: crosshair; background: #000002; }

    #hud {
      position: absolute; top: 10px; left: 12px;
      font-size: 11px; font-family: monospace;
      color: #334466; line-height: 1.8; pointer-events: none;
    }

    #ctrl {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      padding: 9px 14px; background: #060810;
      border-top: 0.5px solid #0d1520;
    }
    #ctrl label { font-size: 12px; color: #446688; }
    #ctrl input[type=range] { width: 95px; accent-color: #4488cc; }
    #ctrl .v { font-size: 12px; color: #88aacc; min-width: 30px; }
    select {
      background: #060810; color: #88aacc;
      border: 0.5px solid #1a2535; border-radius: 6px;
      padding: 3px 8px; font-size: 12px;
    }
    button {
      background: transparent; color: #446688;
      border: 0.5px solid #1a2535; border-radius: 6px;
      padding: 5px 11px; font-size: 12px; cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #0d1520; color: #88aacc; }

    #legend {
      display: flex; flex-wrap: wrap; gap: 14px;
      padding: 6px 14px 8px; background: #060810;
      font-size: 11px; font-family: monospace;
    }
    .leg { display: flex; align-items: center; gap: 5px; color: #334466; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    #tip {
      font-size: 11px; color: #223344; margin-top: 8px; text-align: center; line-height: 1.7;
    }
  </style>
</head>
<body>

<h1>Simulation N-Corps Gravitationnelle</h1>

<div id="wrap">
  <canvas id="c"></canvas>

  <div id="hud">
    <div id="h-bodies">corps: 0</div>
    <div id="h-time">t: 0.00</div>
    <div id="h-energy">Ec: —</div>
  </div>

  <div id="ctrl">
    <label>G</label>
    <input type="range" id="sl-g" min="100" max="5000" value="1200" step="100">
    <span class="v" id="v-g">1200</span>

    <label>Vitesse</label>
    <input type="range" id="sl-dt" min="1" max="20" value="8" step="1">
    <span class="v" id="v-dt">8</span>

    <label>Traînée</label>
    <input type="range" id="sl-trail" min="5" max="150" value="40" step="5">
    <span class="v" id="v-trail">40</span>

    <label>Ajouter</label>
    <select id="body-type">
      <option value="star">Étoile</option>
      <option value="planet">Planète</option>
      <option value="giant">Géante rouge</option>
      <option value="bh">Trou noir</option>
      <option value="dwarf">Naine blanche</option>
    </select>

    <label>Scène</label>
    <select id="sel-scene">
      <option value="galaxy">Galaxie spirale</option>
      <option value="binary">Étoiles binaires</option>
      <option value="blackhole">Trou noir</option>
      <option value="chaos">Chaos</option>
      <option value="ring">Anneau orbital</option>
    </select>
    <button id="btn-scene">Charger</button>
    <button id="btn-pause">Pause</button>
    <button id="btn-clear">Vider</button>
  </div>

  <div id="legend">
    <div class="leg"><div class="dot" style="background:#fff8e0;box-shadow:0 0 4px #fff8e0"></div>Étoile</div>
    <div class="leg"><div class="dot" style="background:#4488ff;box-shadow:0 0 4px #4488ff"></div>Planète</div>
    <div class="leg"><div class="dot" style="background:#ff6633;box-shadow:0 0 4px #ff6633"></div>Géante rouge</div>
    <div class="leg"><div class="dot" style="background:#110022;border:1px solid #aa44ff"></div>Trou noir</div>
    <div class="leg"><div class="dot" style="background:#aaffee;box-shadow:0 0 4px #aaffee"></div>Naine blanche</div>
  </div>
</div>

<p id="tip">
  Cliquer-glisser pour lancer un corps (direction = vecteur vitesse) · Les corps fusionnent lors des collisions<br>
  Un corps assez massif devient automatiquement un trou noir
</p>

<script>
  const cv = document.getElementById('c');
  const cx = cv.getContext('2d');
  const W = 720, H = 460;
  cv.width = W; cv.height = H;

  let G = 1200, DT_BASE = 8, TRAIL_LEN = 40;
  let paused = false, simTime = 0;
  let bodies = [], trails = new Map(), uid = 0;
  const SOFTENING = 80;

  const TYPES = {
    star:   { color: '#fff8e0', glow: '#ffe080', mass: () => 80  + Math.random() * 120, radius: () => 3.5 },
    planet: { color: '#4488ff', glow: '#2266cc', mass: () => 5   + Math.random() * 15,  radius: () => 2.2 },
    giant:  { color: '#ff6633', glow: '#cc3300', mass: () => 200 + Math.random() * 300, radius: () => 5.0 },
    bh:     { color: '#110022', glow: '#aa44ff', mass: () => 2000+ Math.random() * 3000,radius: () => 7.0 },
    dwarf:  { color: '#aaffee', glow: '#44ffcc', mass: () => 30  + Math.random() * 50,  radius: () => 2.0 },
  };

  class Body {
    constructor(x, y, vx, vy, type = 'star') {
      this.id = uid++; this.x = x; this.y = y;
      this.vx = vx; this.vy = vy;
      const T = TYPES[type];
      this.type = type; this.mass = T.mass(); this.radius = T.radius();
      this.color = T.color; this.glow = T.glow;
      this.ax = 0; this.ay = 0; this.dead = false;
    }
  }

  function addBody(x, y, vx, vy, type) {
    const b = new Body(x, y, vx, vy, type);
    bodies.push(b); trails.set(b.id, []);
    return b;
  }

  function clearAll() { bodies = []; trails = new Map(); simTime = 0; }

  // ── Scènes ──────────────────────────────────────────────────────────
  function loadScene(name) {
    clearAll();
    if (name === 'galaxy') {
      const bh = addBody(W/2, H/2, 0, 0, 'bh'); bh.mass = 2500;
      for (let i = 0; i < 65; i++) {
        const arm = Math.floor(Math.random() * 3);
        const t2 = Math.random();
        const angle = arm * (Math.PI * 2 / 3) + t2 * Math.PI * 1.6;
        const r = 35 + t2 * 170;
        const x = W/2 + Math.cos(angle) * r, y = H/2 + Math.sin(angle) * r;
        const v = Math.sqrt(G * bh.mass / r) * (0.88 + Math.random() * 0.24);
        const scatter = (Math.random() - 0.5) * 15;
        addBody(x + scatter, y + scatter,
          -Math.sin(angle) * v, Math.cos(angle) * v,
          Math.random() < 0.15 ? 'giant' : Math.random() < 0.3 ? 'dwarf' : 'planet');
      }
      for (let i = 0; i < 14; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r = 55 + Math.random() * 140;
        const x = W/2 + Math.cos(angle) * r, y = H/2 + Math.sin(angle) * r;
        const v = Math.sqrt(G * bh.mass / r) * 0.95;
        addBody(x, y, -Math.sin(angle) * v, Math.cos(angle) * v, 'star');
      }

    } else if (name === 'binary') {
      const b1 = addBody(W/2 - 90, H/2,  0, -65, 'star'); b1.mass = 450;
      const b2 = addBody(W/2 + 90, H/2,  0,  65, 'star'); b2.mass = 450;
      for (let i = 0; i < 35; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r = 60 + Math.random() * 150;
        const x = W/2 + Math.cos(angle) * r, y = H/2 + Math.sin(angle) * r;
        const v = Math.sqrt(G * 900 / (r + 60)) * 0.75;
        addBody(x, y, -Math.sin(angle) * v * (0.9 + Math.random() * 0.2),
          Math.cos(angle) * v * (0.9 + Math.random() * 0.2), 'planet');
      }

    } else if (name === 'blackhole') {
      const bh = addBody(W/2, H/2, 0, 0, 'bh'); bh.mass = 5000;
      for (let i = 0; i < 90; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r = 40 + Math.random() * 190;
        const x = W/2 + Math.cos(angle) * r, y = H/2 + Math.sin(angle) * r;
        const v = Math.sqrt(G * 5000 / r) * (0.65 + Math.random() * 0.55);
        addBody(x, y,
          -Math.sin(angle) * v * (0.88 + Math.random() * 0.24),
          Math.cos(angle) * v * (0.88 + Math.random() * 0.24),
          Math.random() < 0.2 ? 'star' : 'planet');
      }

    } else if (name === 'chaos') {
      for (let i = 0; i < 6; i++)
        addBody(100 + Math.random() * (W - 200), 80 + Math.random() * (H - 160),
          (Math.random() - 0.5) * 80, (Math.random() - 0.5) * 80, 'giant');
      for (let i = 0; i < 45; i++)
        addBody(60 + Math.random() * (W - 120), 60 + Math.random() * (H - 120),
          (Math.random() - 0.5) * 130, (Math.random() - 0.5) * 130, 'star');
      for (let i = 0; i < 30; i++)
        addBody(60 + Math.random() * (W - 120), 60 + Math.random() * (H - 120),
          (Math.random() - 0.5) * 160, (Math.random() - 0.5) * 160, 'planet');

    } else if (name === 'ring') {
      const bh = addBody(W/2, H/2, 0, 0, 'bh'); bh.mass = 2800;
      const rings = [{ r: 160, n: 55 }, { r: 100, n: 35 }, { r: 55, n: 18 }];
      for (const { r, n } of rings) {
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2;
          const x = W/2 + Math.cos(a) * r, y = H/2 + Math.sin(a) * r;
          const v = Math.sqrt(G * bh.mass / r) * 0.98;
          addBody(x, y, -Math.sin(a) * v, Math.cos(a) * v,
            i % 8 === 0 ? 'star' : i % 12 === 0 ? 'dwarf' : 'planet');
        }
      }
    }
  }

  // ── Physique : intégration Verlet + collisions ───────────────────────
  function verlet() {
    const N = bodies.length;
    for (let i = 0; i < N; i++) {
      const a = bodies[i]; if (a.dead) continue;
      a.ax = 0; a.ay = 0;
      for (let j = 0; j < N; j++) {
        if (i === j || bodies[j].dead) continue;
        const b = bodies[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist2 = dx * dx + dy * dy + SOFTENING;
        const dist = Math.sqrt(dist2);
        const f = G * b.mass / dist2;
        a.ax += f * dx / dist; a.ay += f * dy / dist;
      }
    }
    const dt = DT_BASE * 0.001;
    for (let i = 0; i < N; i++) {
      const a = bodies[i]; if (a.dead) continue;
      a.vx += a.ax * dt; a.vy += a.ay * dt;
      a.x  += a.vx * dt; a.y  += a.vy * dt;
      if (a.x < -W)    a.x = W * 2;
      if (a.x > W * 2) a.x = -W;
      if (a.y < -H)    a.y = H * 2;
      if (a.y > H * 2) a.y = -H;
      const tr = trails.get(a.id);
      if (tr) { tr.push({ x: a.x, y: a.y }); if (tr.length > TRAIL_LEN) tr.shift(); }
    }
    for (let i = 0; i < N; i++) {
      const a = bodies[i]; if (a.dead) continue;
      for (let j = i + 1; j < N; j++) {
        const b = bodies[j]; if (b.dead) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        if (Math.sqrt(dx * dx + dy * dy) < (a.radius + b.radius) * 1.8) merge(i, j);
      }
    }
    bodies = bodies.filter(b => !b.dead);
    simTime += dt;
  }

  function merge(i, j) {
    const a = bodies[i], b = bodies[j];
    const tm = a.mass + b.mass;
    a.vx = (a.vx * a.mass + b.vx * b.mass) / tm;
    a.vy = (a.vy * a.mass + b.vy * b.mass) / tm;
    a.x  = (a.x  * a.mass + b.x  * b.mass) / tm;
    a.y  = (a.y  * a.mass + b.y  * b.mass) / tm;
    a.mass = tm;
    a.radius = Math.min(11, a.radius * 1.15);
    if      (tm > 3000 && a.type !== 'bh') { a.type = 'bh';    a.color = TYPES.bh.color;    a.glow = TYPES.bh.glow; }
    else if (tm > 500  && a.type === 'planet') { a.type = 'giant'; a.color = TYPES.giant.color; a.glow = TYPES.giant.glow; }
    b.dead = true; trails.delete(b.id);
  }

  // ── Rendu ────────────────────────────────────────────────────────────
  function hexToRgb(hex) {
    return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
  }

  function render() {
    cx.fillStyle = 'rgba(0,0,2,0.18)';
    cx.fillRect(0, 0, W, H);

    for (const b of bodies) {
      const tr = trails.get(b.id);
      if (!tr || tr.length < 2) continue;
      const rgb = hexToRgb(b.glow);
      cx.beginPath(); cx.moveTo(tr[0].x, tr[0].y);
      for (let k = 1; k < tr.length; k++) {
        cx.lineTo(tr[k].x, tr[k].y);
        cx.strokeStyle = `rgba(${rgb},${(k / tr.length) * 0.32})`;
        cx.lineWidth = 0.8;
        cx.stroke(); cx.beginPath(); cx.moveTo(tr[k].x, tr[k].y);
      }
    }

    for (const b of bodies) {
      if (b.type === 'bh') {
        const grad = cx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.radius * 4);
        grad.addColorStop(0, 'rgba(170,68,255,0.22)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        cx.beginPath(); cx.arc(b.x, b.y, b.radius * 4, 0, Math.PI * 2);
        cx.fillStyle = grad; cx.fill();
      }
      cx.beginPath(); cx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      cx.fillStyle = b.color; cx.fill();
      if (b.type !== 'bh') {
        cx.beginPath(); cx.arc(b.x, b.y, b.radius * 1.7, 0, Math.PI * 2);
        cx.fillStyle = `rgba(${hexToRgb(b.glow)},0.11)`; cx.fill();
      }
    }

    document.getElementById('h-bodies').textContent = `corps: ${bodies.length}`;
    document.getElementById('h-time').textContent = `t: ${simTime.toFixed(2)}`;
    let ke = 0;
    for (const b of bodies) ke += 0.5 * b.mass * (b.vx * b.vx + b.vy * b.vy);
    document.getElementById('h-energy').textContent = `Ec: ${Math.round(ke / 1000)}k`;
  }

  // ── Interaction souris ───────────────────────────────────────────────
  let drag = false, dnx = 0, dny = 0;

  cv.addEventListener('mousedown', e => {
    drag = true;
    const r = cv.getBoundingClientRect();
    dnx = (e.clientX - r.left) / r.width * W;
    dny = (e.clientY - r.top)  / r.height * H;
  });
  cv.addEventListener('mouseup', e => {
    if (!drag) return; drag = false;
    const r = cv.getBoundingClientRect();
    const ux = (e.clientX - r.left) / r.width * W;
    const uy = (e.clientY - r.top)  / r.height * H;
    const type = document.getElementById('body-type').value;
    addBody(dnx, dny, (ux - dnx) * 1.5, (uy - dny) * 1.5, type);
  });
  cv.addEventListener('mouseleave', () => drag = false);

  cv.addEventListener('touchstart', e => {
    e.preventDefault(); drag = true;
    const t2 = e.touches[0], r = cv.getBoundingClientRect();
    dnx = (t2.clientX - r.left) / r.width * W;
    dny = (t2.clientY - r.top)  / r.height * H;
  }, { passive: false });
  cv.addEventListener('touchend', e => {
    if (!drag) return; drag = false;
    const t2 = e.changedTouches[0], r = cv.getBoundingClientRect();
    const ux = (t2.clientX - r.left) / r.width * W;
    const uy = (t2.clientY - r.top)  / r.height * H;
    const type = document.getElementById('body-type').value;
    addBody(dnx, dny, (ux - dnx) * 1.5, (uy - dny) * 1.5, type);
  }, { passive: false });

  // ── Contrôles ────────────────────────────────────────────────────────
  document.getElementById('sl-g').addEventListener('input', e => { G = +e.target.value; document.getElementById('v-g').textContent = e.target.value; });
  document.getElementById('sl-dt').addEventListener('input', e => { DT_BASE = +e.target.value; document.getElementById('v-dt').textContent = e.target.value; });
  document.getElementById('sl-trail').addEventListener('input', e => { TRAIL_LEN = +e.target.value; document.getElementById('v-trail').textContent = e.target.value; });
  document.getElementById('btn-scene').addEventListener('click', () => loadScene(document.getElementById('sel-scene').value));
  document.getElementById('btn-pause').addEventListener('click', () => {
    paused = !paused;
    document.getElementById('btn-pause').textContent = paused ? 'Reprendre' : 'Pause';
  });
  document.getElementById('btn-clear').addEventListener('click', clearAll);

  loadScene('galaxy');

  function loop() {
    if (!paused) { verlet(); verlet(); }
    render();
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
