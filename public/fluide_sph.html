<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulation de Fluide SPH</title>
  <style>
    /* ── FOOTER ── */
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 10px;
      background: transparent;
      border: none;
      opacity: 0.2;
      pointer-events: auto;
      transition: all 0.25s ease;
    }
    .site-footer::before {
      content: 'Voir plus';
      color: gray;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .site-footer:hover {
      opacity: 1;
      background: rgba(13, 17, 23, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid #30363d;
      border-right: 1px solid #30363d;
      border-radius: 0 8px 0 0;
      padding: 10px 14px;
    }
    .site-footer:hover::before { display: none; }
    .site-footer a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 13px;
      font-family: Arial, sans-serif;
      opacity: 0;
      transform: translateY(5px);
      transition: all 0.2s ease;
    }
    .site-footer:hover a { opacity: 1; transform: translateY(0); }
    .site-footer a:hover { opacity: 0.75; text-decoration: underline; }
    @media (max-width: 600px) {
      .site-footer { left: 0; right: 0; justify-content: center; }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #060a12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 20px;
    }
    h1 { color: #aac4dd; font-size: 18px; font-weight: 500; margin-bottom: 14px; letter-spacing: 0.04em; }
    #fluid-wrap {
      background: #0a0f1a;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1a2535;
    }
    canvas { display: block; width: 100%; cursor: crosshair; }
    #ctrl {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      padding: 10px 14px; background: #0d1220;
      border-top: 0.5px solid #1e2a3a;
    }
    #ctrl label { font-size: 12px; color: #6a8aaa; }
    #ctrl input[type=range] { width: 110px; accent-color: #3a8fd4; }
    #ctrl span.val { font-size: 12px; color: #aac4dd; min-width: 28px; }
    select {
      background: #0d1220; color: #aac4dd;
      border: 0.5px solid #2a3a4a; border-radius: 6px;
      padding: 3px 8px; font-size: 12px;
    }
    button {
      background: transparent; color: #6a8aaa;
      border: 0.5px solid #2a3a4a; border-radius: 6px;
      padding: 5px 12px; font-size: 12px; cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1a2535; color: #aac4dd; }
    #stats {
      font-size: 11px; color: #3a5a7a;
      padding: 5px 14px 7px; background: #0d1220;
      font-family: monospace;
    }
  </style>
</head>
<body>

<h1>Simulation de Fluide — SPH</h1>

<div id="fluid-wrap">
  <canvas id="fc"></canvas>
  <div id="ctrl">
    <label>Gravité</label>
    <input type="range" id="grav" min="0" max="2000" value="800" step="50">
    <span class="val" id="grav-v">800</span>

    <label style="margin-left:8px">Viscosité</label>
    <input type="range" id="visc" min="0" max="80" value="20" step="5">
    <span class="val" id="visc-v">20</span>

    <label style="margin-left:8px">Couleur</label>
    <select id="col">
      <option value="blue">Eau</option>
      <option value="lava">Lave</option>
      <option value="plasma">Plasma</option>
      <option value="acid">Acide</option>
    </select>

    <button id="btn-drop">+ Goutte</button>
    <button id="btn-clear">Vider</button>
  </div>
  <div id="stats">particules: 0</div>
</div>

<p style="font-size:12px; color:#3a5a7a; margin-top:10px;">
  Dessine avec la souris · Clic droit pour repousser · Toucher supporté
</p>

<script>
  const canvas = document.getElementById('fc');
  const ctx = canvas.getContext('2d');
  const W = 680, H = 420;
  canvas.width = W; canvas.height = H;

  const COLORS = {
    blue:   (sp) => `hsl(${200 + sp * 20},${70 + sp * 30}%,${40 + sp * 25}%)`,
    lava:   (sp) => `hsl(${sp * 40},${80 + sp * 20}%,${30 + sp * 30}%)`,
    plasma: (sp) => `hsl(${270 + sp * 60},${60 + sp * 30}%,${40 + sp * 30}%)`,
    acid:   (sp) => `hsl(${80 + sp * 30},${70 + sp * 30}%,${35 + sp * 30}%)`,
  };

  const H_RAD = 20, H2 = H_RAD * H_RAD;
  const REST_DENS = 12, K = 800;
  const MASS = 1, DT = 0.016, BOUND_DAMP = 0.4;
  const MAX_PARTICLES = 450;

  let particles = [];
  let gravity = 800, viscosity = 20, colorMode = 'blue';

  class Particle {
    constructor(x, y, vx = 0, vy = 0) {
      this.x = x; this.y = y;
      this.vx = vx; this.vy = vy;
      this.density = 0; this.pressure = 0;
      this.fx = 0; this.fy = 0;
    }
  }

  function spawnDrop(cx, cy, n = 60) {
    for (let i = 0; i < n; i++) {
      if (particles.length >= MAX_PARTICLES) break;
      const a = Math.random() * Math.PI * 2, r = Math.random() * 22;
      particles.push(new Particle(
        cx + Math.cos(a) * r, cy + Math.sin(a) * r,
        (Math.random() - 0.5) * 80, (Math.random() - 0.5) * 80
      ));
    }
  }

  function poly6(r2) {
    if (r2 >= H2) return 0;
    const d = H2 - r2;
    return 315 / (64 * Math.PI * Math.pow(H_RAD, 9)) * d * d * d;
  }
  function spikyGrad(r) {
    if (r <= 0 || r >= H_RAD) return 0;
    return -45 / (Math.PI * Math.pow(H_RAD, 6)) * (H_RAD - r) * (H_RAD - r);
  }
  function viscLap(r) {
    if (r >= H_RAD) return 0;
    return 45 / (Math.PI * Math.pow(H_RAD, 6)) * (H_RAD - r);
  }

  function step() {
    const N = particles.length;
    for (let i = 0; i < N; i++) {
      particles[i].density = 0;
      for (let j = 0; j < N; j++) {
        const dx = particles[j].x - particles[i].x;
        const dy = particles[j].y - particles[i].y;
        particles[i].density += MASS * poly6(dx * dx + dy * dy);
      }
      particles[i].pressure = K * (particles[i].density - REST_DENS);
    }
    for (let i = 0; i < N; i++) {
      let fx = 0, fy = 0;
      for (let j = 0; j < N; j++) {
        if (i === j) continue;
        const dx = particles[j].x - particles[i].x;
        const dy = particles[j].y - particles[i].y;
        const r = Math.sqrt(dx * dx + dy * dy) + 0.0001;
        if (r < H_RAD) {
          const pf = -(particles[i].pressure + particles[j].pressure)
            / (2 * (particles[j].density || 0.001)) * MASS * spikyGrad(r) / r;
          fx += pf * dx; fy += pf * dy;
          const vf = viscosity * MASS / (particles[j].density || 0.001) * viscLap(r);
          fx += vf * (particles[j].vx - particles[i].vx);
          fy += vf * (particles[j].vy - particles[i].vy);
        }
      }
      fy += gravity * (particles[i].density || 1);
      particles[i].fx = fx;
      particles[i].fy = fy;
    }
    for (let i = 0; i < N; i++) {
      const p = particles[i], d = Math.max(p.density, 0.001);
      p.vx += DT * p.fx / d;
      p.vy += DT * p.fy / d;
      p.x += DT * p.vx;
      p.y += DT * p.vy;
      const R = 4;
      if (p.x < R)     { p.x = R;     p.vx *= -BOUND_DAMP; }
      if (p.x > W - R) { p.x = W - R; p.vx *= -BOUND_DAMP; }
      if (p.y < R)     { p.y = R;     p.vy *= -BOUND_DAMP; }
      if (p.y > H - R) { p.y = H - R; p.vy *= -BOUND_DAMP; }
    }
  }

  function draw() {
    ctx.fillStyle = '#0a0f1a';
    ctx.fillRect(0, 0, W, H);
    const cf = COLORS[colorMode];
    for (const p of particles) {
      const sp = Math.min(1, Math.sqrt(p.vx * p.vx + p.vy * p.vy) / 200);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = cf(sp);
      ctx.fill();
    }
    document.getElementById('stats').textContent =
      `particules: ${particles.length} / ${MAX_PARTICLES}`;
  }

  let dragging = false, rightDrag = false, mx = 0, my = 0;

  canvas.addEventListener('contextmenu', e => e.preventDefault());
  canvas.addEventListener('mousedown', e => {
    rightDrag = e.button === 2;
    dragging = true;
    const r = canvas.getBoundingClientRect();
    mx = (e.clientX - r.left) / r.width * W;
    my = (e.clientY - r.top) / r.height * H;
  });
  canvas.addEventListener('mousemove', e => {
    if (!dragging) return;
    const r = canvas.getBoundingClientRect();
    const nx = (e.clientX - r.left) / r.width * W;
    const ny = (e.clientY - r.top) / r.height * H;
    if (!rightDrag && particles.length < MAX_PARTICLES) {
      particles.push(new Particle(nx, ny, (nx - mx) * 8, (ny - my) * 8));
    } else if (rightDrag) {
      for (const p of particles) {
        const dx = p.x - nx, dy = p.y - ny;
        const dist = Math.sqrt(dx * dx + dy * dy) + 1;
        if (dist < 80) { p.vx += dx / dist * 300; p.vy += dy / dist * 300; }
      }
    }
    mx = nx; my = ny;
  });
  canvas.addEventListener('mouseup', () => dragging = false);
  canvas.addEventListener('mouseleave', () => dragging = false);

  canvas.addEventListener('touchstart', e => {
    e.preventDefault(); dragging = true;
    const t = e.touches[0], r = canvas.getBoundingClientRect();
    mx = (t.clientX - r.left) / r.width * W;
    my = (t.clientY - r.top) / r.height * H;
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!dragging) return;
    const t = e.touches[0], r = canvas.getBoundingClientRect();
    const nx = (t.clientX - r.left) / r.width * W;
    const ny = (t.clientY - r.top) / r.height * H;
    if (particles.length < MAX_PARTICLES)
      particles.push(new Particle(nx, ny, (nx - mx) * 8, (ny - my) * 8));
    mx = nx; my = ny;
  }, { passive: false });
  canvas.addEventListener('touchend', () => dragging = false);

  document.getElementById('grav').addEventListener('input', e => {
    gravity = +e.target.value;
    document.getElementById('grav-v').textContent = e.target.value;
  });
  document.getElementById('visc').addEventListener('input', e => {
    viscosity = +e.target.value;
    document.getElementById('visc-v').textContent = e.target.value;
  });
  document.getElementById('col').addEventListener('change', e => colorMode = e.target.value);
  document.getElementById('btn-drop').addEventListener('click', () => {
    spawnDrop(W / 2 + (Math.random() - 0.5) * 100, 60);
  });
  document.getElementById('btn-clear').addEventListener('click', () => particles = []);

  spawnDrop(W / 2, 80, 80);
  spawnDrop(W / 3, 50, 40);

  function loop() { step(); draw(); requestAnimationFrame(loop); }
  loop();
</script>
</body>
<footer class="site-footer">
  <a href="/about">À propos</a>
  <a href="/how-to-play">Comment jouer</a>
  <a href="/fractales">Fractales</a>
  <a href="/gravite">Gravité</a>
  <a href="/fluide">Fluide</a>
</footer>
</html>
