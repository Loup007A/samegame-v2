<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>404 - Réalité instable | Same Game</title>

  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at top, #0d1117, #05080c);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 80px;
      color: #ff4d4d;
      margin: 0;
    }

    h2 {
      color: #58a6ff;
    }

    p {
      opacity: 0.85;
    }

    .cookie {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #c68642;
      margin: 20px auto;
      cursor: pointer;
      position: relative;
      box-shadow: inset -8px -8px 0 rgba(0,0,0,0.2);
      transition: transform 0.1s;
    }

    .cookie:active {
      transform: scale(0.9);
    }

    .chip {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #5a3a1b;
      border-radius: 50%;
    }

    .score {
      font-size: 20px;
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #238636;
      border-radius: 6px;
      color: white;
      text-decoration: none;
    }

    .floating {
      position: absolute;
      font-size: 18px;
      animation: floatUp 1s ease-out forwards;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-50px); }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>404</h1>
  <h2>Réalité instable détectée</h2>

  <p>Tu as trouvé une zone cachée du système…</p>

  <div id="gameArea"></div>

  <a href="/" class="btn">🎮 Retour au jeu principal</a>
</div>

<script>
let score = 0;

const gameArea = document.getElementById("gameArea");

// 🎲 50% chance d'avoir le mini-jeu
if (Math.random() < 0.5) {
  spawnCookieGame();
} else {
  gameArea.innerHTML = "<p>🔒 Aucun module de réalité stable chargé.</p>";
}

function spawnCookieGame() {
  const cookie = document.createElement("div");
  cookie.className = "cookie";

  // petits chips décoratifs
  for (let i = 0; i < 6; i++) {
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.style.left = Math.random() * 100 + "px";
    chip.style.top = Math.random() * 100 + "px";
    cookie.appendChild(chip);
  }

  const scoreText = document.createElement("div");
  scoreText.className = "score";
  scoreText.innerText = "Score : 0";

  cookie.onclick = (e) => {
    score++;

    scoreText.innerText = "Score : " + score;

    // effet +1 flottant
    const float = document.createElement("div");
    float.className = "floating";
    float.innerText = "+1";
    float.style.left = (e.pageX - 10) + "px";
    float.style.top = (e.pageY - 10) + "px";
    document.body.appendChild(float);

    setTimeout(() => float.remove(), 1000);
  };

  gameArea.appendChild(cookie);
  gameArea.appendChild(scoreText);
}
</script>

</body>
</html>
